# Townia – 日本語メッセージ
# Format: MiniMessage (https://docs.advntr.dev/minimessage/format.html)
# Placeholders use {curly_braces} syntax.

# ── General Errors ────────────────────────────────────────────
error:
  no-permission: "<red>このコマンドを実行する権限がありません。"
  player-only: "<red>このコマンドはプレイヤーのみ実行できます。"
  invalid-args: "<red>引数が無効です。<yellow>/town help</yellow> または <yellow>/nation help</yellow> を確認してください。"
  player-not-found: "<red>プレイヤー <yellow>{player}</yellow> が見つかりません。"
  town-not-found: "<red>町 <yellow>{town}</yellow> が見つかりません。"
  nation-not-found: "<red>国 <yellow>{nation}</yellow> が見つかりません。"
  not-in-town: "<red>あなたはどの町にも所属していません。"
  already-in-town: "<red>あなたはすでに町に所属しています。先に脱退してください。"
  wrong-world: "<red>ワールド <yellow>{world}</yellow> では土地の保護は許可されていません。"
  no-vault: "<red>このサーバーでは経済機能が利用できません。"
  insufficient-funds: "<red>所持金が不足しています。必要額: <yellow>{amount}"
  invalid-amount: "<red>有効な正の金額を指定してください。"
  database: "<red>データベースエラーが発生しました。管理者に連絡してください。"
  cannot-kick-mayor: "<red>町の町長をキックすることはできません。"
  not-same-town: "<red>そのプレイヤーは同じ町にいません。"
  rank-not-found: "<red>不明な役職 <yellow>{rank}</yellow> です。有効な役職: ASSISTANT, CO_MAYOR"

