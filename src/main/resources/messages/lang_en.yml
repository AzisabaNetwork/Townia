# Townia - English Messages
# Format: MiniMessage (https://docs.advntr.dev/minimessage/format.html)
# Placeholders use {curly_braces} syntax.

# Message version
version: 15

# ── General Errors ────────────────────────────────────────────
error:
  no-permission: "<red>You do not have permission to do this."
  player-only: "<red>This command can only be used by a player."
  invalid-args: "<red>Invalid arguments. Use <yellow>/town help</yellow> or <yellow>/nation help</yellow>."
  player-not-found: "<red>Player <yellow>{player}</yellow> was not found."
  town-not-found: "<red>Town <yellow>{town}</yellow> was not found."
  nation-not-found: "<red>Nation <yellow>{nation}</yellow> was not found."
  not-in-town: "<red>You are not a member of any town."
  already-in-town: "<red>You are already a member of a town. Leave it first."
  wrong-world: "<red>Land claims are not permitted in world <yellow>{world}</yellow>."
  no-vault: "<red>Economy is not available on this server."
  insufficient-funds: "<red>You do not have enough money. Required: <yellow>{amount}\""
  invalid-amount: "<red>Please specify a valid positive amount."
  database: "<red>A database error occurred. Please contact an administrator."
  cannot-kick-mayor: "<red>You cannot kick the mayor of a town."
  not-same-town: "<red>That player is not in your town."
  rank-not-found: "<red>Unknown rank <yellow>{rank}</yellow>. Valid ranks: ASSISTANT, CO_MAYOR"
  not-implemented: "<yellow>This feature is not implemented yet."
  outpost-not-found: "<red>Outpost not found."
  outpost-not-public: "<red>That outpost is not public."
  town-not-open: "<red>This town is not open."

